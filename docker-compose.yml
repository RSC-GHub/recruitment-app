## ============================================================
##  Recruitment System — Docker Compose (Production)
##  SQL Server + Recruitment.Web + Recruitment.Api
## ============================================================

services:

  # -------------------- SQL Server --------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: recruitment-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_SA_PASSWORD:-P@ssw0rd@RSC2026!}
      - MSSQL_MEMORY_LIMIT_MB=1024
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "127.0.0.1:1433:1433"
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -------------------- Recruitment Web (MVC) ---------------
  recruitment-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: recruitment-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=RecruitmentDB;User Id=sa;Password=${DB_SA_PASSWORD:-P@ssw0rd@RSC2026!};TrustServerCertificate=True;MultipleActiveResultSets=true;
      - FileStorage__CvPath=/app/uploads/cv
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    volumes:
      - cv_uploads:/app/uploads/cv
    ports:
      - "127.0.0.1:5010:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  # -------------------- Recruitment API ---------------------
  recruitment-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: recruitment-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=RecruitmentDB;User Id=sa;Password=${DB_SA_PASSWORD:-P@ssw0rd@RSC2026!};TrustServerCertificate=True;MultipleActiveResultSets=true;
      - FileStorage__CvPath=/app/uploads/cv
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    volumes:
      - cv_uploads:/app/uploads/cv
    ports:
      - "127.0.0.1:5011:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
    name: recruitment_sqlserver_data
  cv_uploads:
    name: recruitment_cv_uploads
